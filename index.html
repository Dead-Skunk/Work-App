<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Field Forms</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="brand">
          <img class="brand-mark brand-logo" src="assets/logo.jpg" alt="Latino Sol logo" />
          <span class="brand-text">Field Forms</span>
        </div>
        <div class="header-actions">
          <label class="lang-select">
            <span id="langLabel">Language</span>
            <select id="langSelect">
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="vi">Tiếng Việt</option>
            </select>
          </label>
          <button id="logoutBtn" class="ghost hidden">Sign out</button>
        </div>
      </header>

      <main id="viewRoot"></main>
    </div>

    <template id="loginView">
      <section class="card">
        <h1 id="loginTitle">Employee Sign In</h1>
        <p id="loginDesc" class="muted">Use your employee ID to sign in.</p>
        <form id="loginForm" class="form">
          <label>
            <span id="loginEmployeeIdLabel">Employee ID</span>
            <input type="text" name="employeeId" autocomplete="off" required />
          </label>
          <button id="loginSubmitBtn" type="submit" class="primary">Sign in</button>
        </form>
      </section>
    </template>

    <template id="formsView">
      <section class="card">
        <h1 id="formsTitle">Service Forms</h1>
        <p id="formsDesc" class="muted">Select a service to open the form.</p>
        <div class="client-row">
          <div class="client-status">
            <p class="muted" id="clientStatus">Current client: not set</p>
          </div>
          <form id="clientLookupForm" class="client-form">
            <label>
              <span id="clientBirthdayLabel">Client birthday</span>
              <input type="date" name="clientBirthday" required />
            </label>
            <label>
              <span id="clientSsnLabel">Last 4 SSN</span>
              <input type="text" name="clientSsnLast4" inputmode="numeric" pattern="\\d{4}" maxlength="4" required />
            </label>
            <button id="setClientBtn" type="submit" class="ghost">Set Client</button>
            <button type="button" id="clearClientBtn" class="ghost">Clear</button>
          </form>
        </div>
        <div id="formsGrid" class="grid"></div>
      </section>
    </template>

    <template id="formDetailView">
      <section class="card">
        <div class="form-header">
          <div>
            <h1 id="formTitle"></h1>
            <p id="formDesc" class="muted"></p>
          </div>
          <button id="backBtn" class="ghost">Back</button>
        </div>
        <form id="serviceForm" class="form"></form>
      </section>
    </template>

    <template id="toastTemplate">
      <div class="toast" role="status"></div>
    </template>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
